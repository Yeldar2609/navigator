# Firebase App Hosting — Kim Bolam (Next.js App Router, SSR).
# Public client config is set as plain env. Server secrets are referenced from
# Google Secret Manager (create them first; see docs/SECRETS_SETUP.md).
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # --- Public (client-safe; inlined at build) ---
  - variable: NEXT_PUBLIC_APP_NAME
    value: Kim Bolam
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DEFAULT_LOCALE
    value: ru
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPPORTED_LOCALES
    value: ru,kk,en
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: kim-bolam
    availability:
      - BUILD
      - RUNTIME
  - variable: APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CLOUD_PROJECT
    value: kim-bolam
    availability:
      - RUNTIME

  # --- Secrets (create in Secret Manager; names must match) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME
  - variable: REPORT_BUCKET
    secret: REPORT_BUCKET
    availability:
      - RUNTIME
