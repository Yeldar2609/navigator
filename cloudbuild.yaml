# Cloud Build → Artifact Registry → (deploy step run separately).
# NEXT_PUBLIC_* are inlined into the client bundle at build time, so they must be
# passed as --build-arg here. These are Firebase WEB config values (public by
# design — security is enforced by Firestore/Storage rules), not secrets.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=kim-bolam.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=kim-bolam'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=kim-bolam.firebasestorage.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=887167045950'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FB_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_APP_URL}'
      - '-t'
      - 'europe-west1-docker.pkg.dev/kim-bolam/kim-bolam/app:latest'
      - '.'
images:
  - 'europe-west1-docker.pkg.dev/kim-bolam/kim-bolam/app:latest'
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
